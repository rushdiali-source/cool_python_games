<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Latest stable Brython CDN links -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <div id="turtle-div"></div>

    <script type="text/python">
        import turtle
        
        # Connect to our HTML box
        turtle.set_panel('turtle-div')
        
        t = turtle.Turtle()
        t.speed(0) 
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Draw the spiral using clean Brython syntax
        for x in range(100):
            t.pencolor(colors[x % 6])
            # Use standard division and integer casting for Brython stability
            thickness = int(x / 25) + 1
            t.pensize(thickness)
            
            t.forward(x * 2)
            t.left(59)
    </script>

</body>
</html>
