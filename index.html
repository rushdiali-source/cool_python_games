<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Graphics</title>
    
    <!-- Using stable Skulpt links to render pure Python turtle graphics safely -->
    <script src="https://cloudflare.com" type="text/javascript"></script>
    <script src="https://cloudflare.com" type="text/javascript"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        /* Style the container box where the Python turtle will draw */
        #turtle-canvas {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>
<body>

    <h1>My Python Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- The exact target container box required for drawing -->
    <div id="turtle-canvas"></div>

    <script type="text/javascript">
        // Real Python code saved as a text string for Skulpt to execute
        const pythonCode = `
import turtle

t = turtle.Turtle()
t.speed(0)

colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']

# Pure Python loop to draw your spiral
for x in range(100):
    t.pencolor(colors[x % 6])
    t.forward(x * 2)
    t.left(59)
`;

        function runPython() {
            // Configure Skulpt to output graphics inside our canvas box element
            Sk.configure({
                target: 'turtle-canvas',
                read: function(x) {
                    if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
                        throw "File not found: '" + x + "'";
                    return Sk.builtinFiles["files"][x];
                }
            });
            
            // Run the pure Python code string
            Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody("<stdin>", false, pythonCode, true);
            });
        }

        // Automatically trigger the Python script engine when the web page loads
        window.onload = runPython;
    </script>

</body>
</html>
