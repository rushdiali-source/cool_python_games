<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- These load the core Python engine and the standard graphics library -->
    <script type="text/javascript" src="https://cloudflare.com"></script>
    <script type="text/javascript" src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        /* This creates the canvas container box */
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<!-- This tells the browser to start the Python engine when the page loads -->
<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- The exact target container box where the Python turtle will draw -->
    <div id="turtle-div"></div>

    <!-- Here is your real Python code -->
    <script type="text/python">
        import turtle
        from browser import document
        
        # Connect your Python code directly to the HTML container box above
        turtle.set_defaults(turtle_canvas_wrapper=document['turtle-div'])
        
        t = turtle.Turtle()
        t.speed(0)
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Pure Python loop to draw your beautiful spiral
        for x in range(100):
            t.pencolor(colors[x % 6])
            t.forward(x * 2)
            t.left(59)
            
        turtle.done()
    </script>

</body>
</html>
