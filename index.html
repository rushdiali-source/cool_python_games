<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Graphics</title>
    
    <!-- Using stable PyScript links to run pure Python -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        /* Style the target drawing canvas board */
        #turtle-canvas {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>My Python Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- Native HTML5 canvas used directly by PyScript -->
    <canvas id="turtle-canvas" width="500" height="500"></canvas>

    <!-- Write your pure Python code directly inside the tags -->
    <script type="py">
        import turtle
        
        # Link the turtle screen directly to our HTML canvas tag
        screen = turtle.Screen()
        screen.setup(500, 500)
        
        t = turtle.Turtle()
        t.speed(0) 
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Pure Python loop to draw the spiral
        for x in range(100):
            t.pencolor(colors[x % 6])
            t.forward(x * 2)
            t.left(59)
            
        turtle.done()
    </script>

</body>
</html>
