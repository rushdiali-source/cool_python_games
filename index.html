<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Use direct global fallback scripts from Brython CDN -->
    <script type="text/javascript" src="https://cloudflare.com"></script>
    <script type="text/javascript" src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython(1)">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- The target wrapper element -->
    <div id="turtle-div"></div>

    <script type="text/python">
        from browser import document, alert
        import turtle

        try:
            # Force Brython default engine config parameters 
            turtle.set_defaults(
                turtle_canvas_wrapper = document['turtle-div']
            )
            
            t = turtle.Turtle()
            t.speed(0)
            
            colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
            
            for x in range(100):
                t.color(colors[x % 6])
                t.forward(x * 2)
                t.left(59)
                
            turtle.done()

        except Exception as err:
            alert("Python Error: " + str(err))
    </script>

</body>
</html>
