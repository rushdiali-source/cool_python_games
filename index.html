<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Graphics</title>

    <!-- REAL Skulpt libraries -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }

        #turtle-canvas {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body>

    <h1>My Python Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <div id="turtle-canvas"></div>

    <script>
        // Python code
        const pythonCode = `
from turtle import *

speed(0)

colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']

for x in range(100):
    pencolor(colors[x % 6])
    width(x // 10 + 1)
    forward(x * 2)
    left(59)

hideturtle()
done()
`;

        // Required for Skulpt file reading
        function builtinRead(x) {
            if (Sk.builtinFiles === undefined ||
                Sk.builtinFiles["files"][x] === undefined) {
                throw "File not found: '" + x + "'";
            }
            return Sk.builtinFiles["files"][x];
        }

        function runPython() {

            // Connect turtle graphics to the canvas div
            Sk.TurtleGraphics = {
                target: 'turtle-canvas'
            };

            // Configure Skulpt
            Sk.configure({
                output: function(text) {
                    console.log(text);
                },
                read: builtinRead,
                __future__: Sk.python3
            });

            // Run Python
            Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody(
                    "<stdin>",
                    false,
                    pythonCode,
                    true
                );
            }).catch(function(err) {
                console.error(err.toString());
            });
        }

        // Run automatically
        window.onload = runPython;
    </script>

</body>
</html>
