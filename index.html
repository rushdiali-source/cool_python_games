<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Exact matching version scripts for optimal browser drawing -->
    <script type="text/javascript" src="https://cloudflare.com"></script>
    <script type="text/javascript" src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- This empty div container is perfectly targeted -->
    <div id="turtle-div"></div>

    <script type="text/python">
        import turtle
        from browser import document
        
        # Connect to our box container using Brython's native wrapper function
        turtle.set_defaults(turtle_canvas_wrapper=document['turtle-div'])
        
        t = turtle.Turtle()
        t.speed(0)
        
        # Draw a beautiful geometric spiral without using unstable math loops
        for i in range(120):
            # Change colors based on simple step rotation
            if i % 4 == 0:
                t.pencolor("red")
            elif i % 4 == 1:
                t.pencolor("blue")
            elif i % 4 == 2:
                t.pencolor("purple")
            else:
                t.pencolor("green")
                
            t.forward(i * 2)
            t.left(91)  # Perfect 91-degree angle creates a gorgeous square spiral
            
        turtle.done()
    </script>

</body>
</html>
