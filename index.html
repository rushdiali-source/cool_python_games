<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Using stable, matched version CDN scripts -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- Explicit element target for Brython injection -->
    <div id="turtle-div"></div>

    <script type="text/python">
        from browser import document
        import turtle
        
        # Explicit target pairing parameter configuration
        turtle.set_defaults(
            turtle_canvas_wrapper = document['turtle-div']
        )
        
        t = turtle.Turtle()
        
        # Set a controlled animation speed value (1-10) to prevent render blocking
        t.speed(3)
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Clean processing loop
        for x in range(100):
            t.pencolor(colors[x % 6])
            t.forward(x * 2)
            t.left(59)
            
        turtle.done()
    </script>

</body>
</html>
