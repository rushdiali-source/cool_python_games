<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Correctly structured stable library script files -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- The target drawing wrapper container -->
    <div id="turtle-div"></div>

    <script type="text/python">
        from browser import document
        import turtle
        
        # Explicitly configure the internal drawing container property
        turtle.set_defaults(turtle_canvas_wrapper=document['turtle-div'])
        
        t = turtle.Turtle()
        t.speed(0)
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Spiral Loop
        for x in range(100):
            t.pencolor(colors[x % 6])
            t.forward(x * 2)
            t.left(59)
            
        turtle.done()
    </script>

</body>
</html>
