<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brython Turtle Graphics</title>
    
    <!-- Using stable Brython CDN links -->
    <script type="text/javascript" src="https://cloudflare.com"></script>
    <script type="text/javascript" src="https://cloudflare.com"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 50px;
        }
        /* Style the container div that Brython will inject the canvas into */
        #turtle-div {
            border: 2px solid #333;
            background-color: white;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body onload="brython()">

    <h1>My Brython Turtle Project</h1>
    <p>Watch Python code run directly in the browser!</p>

    <!-- Changed from <canvas> to a <div> container required by Brython's turtle module -->
    <div id="turtle-div"></div>

    <script type="text/python">
        import turtle
        from browser import document
        
        # Correct Brython setup: target the container div id
        turtle.set_panel('turtle-div')
        
        t = turtle.Turtle()
        t.speed(0) 
        
        colors = ['red', 'purple', 'blue', 'green', 'orange', 'yellow']
        
        # Draw the spiral
        for x in range(100):
            t.pencolor(colors[x % 6])
            t.width(x // 25 + 1)
            t.forward(x * 2)
            t.left(59)
            
        turtle.done()
    </script>

</body>
</html>
